<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Gallery | Optimization Showcase</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 2rem;
        }
        .gallery-item {
            overflow: hidden;
            border-radius: 10px;
            background: #1e293b;
            position: relative;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        .perf-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--main-color);
            color: white;
            padding: 5px 10px;
            font-size: 0.7rem;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header style="padding: 4rem 2rem; text-align: center;">
        <h1 class="highlight">The Spirit of Turkana Gallery</h1>
        <p>Optimized for 3G Networks (80% Weight Reduction)</p>
        <a href="index.html" style="color: var(--main-color); text-decoration: none;">← Back to Portfolio</a>
    </header>

   
    <div class="gallery-grid">
    <div class="gallery-item" data-aos="fade-up">
        <img src="assets/assets:turkana-1.jpeg" alt="The Jade Sea at Sunrise" loading="lazy">
        <div class="img-overlay"><span>Landscape</span></div>
    </div>

    <div class="gallery-item" data-aos="fade-up" data-aos-delay="100">
        <img src="assets/assets:turkana-2.jpeg" alt="Turkana Cultural Beadwork" loading="lazy">
        <div class="img-overlay"><span>Tradition</span></div>
    </div>

    <div class="gallery-item" data-aos="fade-up" data-aos-delay="200">
        <img src="assets/assets:turkana-3.jpeg" alt="Community Traditional Dance" loading="lazy">
        <div class="img-overlay"><span>Resilience</span></div>
    </div>

    <div class="gallery-item" data-aos="fade-up" data-aos-delay="300">
        <img src="assets/assets:turkana-4.jpeg" alt="Fishermen on Lake Turkana" loading="lazy">
        <div class="img-overlay"><span>Daily Life</span></div>
    </div>

    <div class="gallery-item" data-aos="fade-up" data-aos-delay="400">
        <img src="assets/assets:turkana-5.jpeg" alt="The Spirit of the Land" loading="lazy">
        <div class="img-overlay"><span>Spirit</span></div>
    </div>
</div>
</body>
</html>
